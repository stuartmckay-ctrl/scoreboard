<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDPL Pro Scoreboard</title>
    <style>
        :root {
            --ddpl-red: #e63946;
            --ddpl-yellow: #ffbe0b;
            --ddpl-dark: #121212;
            --ddpl-grey: #2d2d2d;
            --ddpl-green: #2ecc71;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--ddpl-dark); color: white; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none;
        }

        header { 
            padding: 10px; background: #000; border-bottom: 3px solid var(--ddpl-yellow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { height: 40px; }

        /* Setup Screen */
        #setup-screen { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .input-group { background: var(--ddpl-grey); padding: 15px; border-radius: 10px; width: 90%; max-width: 400px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--ddpl-yellow); font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; margin-bottom: 5px; border-radius: 5px; border: none; box-sizing: border-box; font-size: 1rem; background: #eee; }
        .start-btn { background: var(--ddpl-green); color: black; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer; width: 90%; max-width: 400px; }

        /* Scoreboard Screen */
        #scoreboard-screen { display: none; flex-grow: 1; flex-direction: column; }
        .sets-indicator { display: flex; justify-content: space-around; background: #222; padding: 10px; border-bottom: 1px solid #444; }
        .set-box { text-align: center; }
        .set-count { font-size: 2.5rem; font-weight: 800; color: var(--ddpl-yellow); }
        .set-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        .score-container { display: flex; height: 40vh; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border: 1px solid #333; }
        #side-1 { border-right: 2px solid var(--ddpl-yellow); }
        .score-num { font-size: 8rem; font-weight: 800; line-height: 1; }
        .player-name { font-size: 1.2rem; font-weight: bold; color: var(--ddpl-yellow); text-align: center; }

        /* History */
        .history-panel { flex-grow: 1; background: #000; display: flex; flex-direction: column; border-top: 2px solid #444; }
        .history-header { padding: 8px; font-size: 0.8rem; background: var(--ddpl-grey); display: flex; justify-content: space-between; }
        #history-list { overflow-y: auto; flex-grow: 1; padding: 10px; margin: 0; font-family: monospace; font-size: 0.8rem; color: #ccc; }
        .set-win-log { color: var(--ddpl-green) !important; font-weight: bold; border-left: 3px solid var(--ddpl-green); padding-left: 5px; margin: 5px 0; }

        .sponsor-box { background: white; color: black; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-top: 4px solid var(--ddpl-red); font-size: 0.8rem; }
        .minus-btn { position: absolute; bottom: 5px; background: transparent; color: #555; border: 1px solid #555; padding: 3px 8px; border-radius: 4px; font-size: 0.6rem; }
    </style>
</head>
<body>

    <header>
        <img src="ddpl_logo_original.png" class="logo">
        <h1 style="font-size: 0.8rem; color: var(--ddpl-yellow);">DDPL PRO SCOREBOARD</h1>
        <button onclick="exitMatch()" style="background:var(--ddpl-red); color:white; border:none; padding:5px 10px; border-radius:4px; font-size: 0.7rem;">EXIT</button>
    </header>

    <div id="setup-screen">
        <div class="input-group">
            <label>Match Type</label>
            <select id="match-type" onchange="toggleSetupFields()">
                <option value="straight">Straight Match (First to X Frames)</option>
                <option value="sets">Set Play (First to X Sets)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>Player 1 Name</label>
            <input type="text" id="p1-name-in" placeholder="Home Player">
            <label>Player 2 Name</label>
            <input type="text" id="p2-name-in" placeholder="Away Player">
        </div>

        <div class="input-group" id="frame-limit-group">
            <label id="race-label">First To (Frames)</label>
            <input type="number" id="race-to-in" value="7">
        </div>

        <div class="input-group" id="set-limit-group" style="display:none;">
            <label>First To (Sets)</label>
            <input type="number" id="sets-to-in" value="3">
            <label>Frames per Set (First to...)</label>
            <input type="number" id="frames-per-set-in" value="3">
        </div>

        <button class="start-btn" onclick="startMatch()">START MATCH</button>
    </div>

    <div id="scoreboard-screen">
        <div class="sets-indicator" id="sets-row" style="display:none;">
            <div class="set-box">
                <div
