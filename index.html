<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDPL Pro Scoreboard</title>
    <style>
        :root {
            --ddpl-red: #e63946;
            --ddpl-yellow: #ffbe0b;
            --ddpl-dark: #121212;
            --ddpl-grey: #2d2d2d;
            --ddpl-green: #2ecc71;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--ddpl-dark); color: white; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none;
        }

        header { 
            padding: 10px; background: #000; border-bottom: 3px solid var(--ddpl-yellow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { height: 40px; }

        #setup-screen { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .input-group { background: var(--ddpl-grey); padding: 15px; border-radius: 10px; width: 95%; max-width: 450px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--ddpl-yellow); font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 5px; border: none; box-sizing: border-box; font-size: 1rem; background: #eee; color: #000; }
        
        .start-btn { background: var(--ddpl-green); color: black; border: none; padding: 18px; font-size: 1.3rem; font-weight: bold; border-radius: 5px; cursor: pointer; width: 95%; max-width: 450px; text-transform: uppercase; }

        #scoreboard-screen { display: none; flex-grow: 1; flex-direction: column; }
        
        /* Sets Display */
        .sets-row { display: flex; justify-content: space-around; background: #000; padding: 10px 0; border-bottom: 2px solid #333; }
        .set-stat { text-align: center; flex: 1; }
        .set-val { font-size: 3rem; font-weight: 900; color: var(--ddpl-yellow); line-height: 1; }
        .set-lbl { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        /* Main Score Area */
        .score-area { display: flex; height: 40vh; position: relative; }
        .player-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border: 1px solid #222; transition: background 0.1s; }
        .player-zone:active { background: #1a1a1a; }
        .active-break { border-bottom: 5px solid var(--ddpl-yellow) !important; background: #1a1a1a; }
        
        .name-tag { font-size: 1.2rem; font-weight: bold; color: var(--ddpl-yellow); margin-bottom: 10px; }
        .big-num { font-size: 9rem; font-weight: 800; line-height: 1; }
        .break-dot { font-size: 0.8rem; background: var(--ddpl-yellow); color: black; padding: 2px 8px; border-radius: 10px; margin-top: 5px; font-weight: bold; visibility: hidden; }
        .active-break .break-dot { visibility: visible; }

        /* Match Log */
        .log-container { flex-grow: 1; background: #080808; display: flex; flex-direction: column; border-top: 1px solid #444; }
        .log-header { padding: 8px 15px; font-size: 0.75rem; background: #222; display: flex; justify-content: space-between; color: #aaa; }
        #log-output { overflow-y: auto; flex-grow: 1; padding: 12px; margin: 0; font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #1a1a1a; padding-bottom: 2px; }
        .set-win { color: var(--ddpl-green); font-weight: bold; border-left: 4px solid var(--ddpl-green); padding-left: 8px; margin: 8px 0; }

        .footer { background: white; color: black; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-top: 4px solid var(--ddpl-red); }
        .minus-btn { position: absolute; bottom: 8px; right: 8px; background: #333; color: #999; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; font-size: 0.6rem; z-index: 5; }
    </style>
</head>
<body>

    <header>
        <img src="ddpl_logo_original.png" class="logo">
        <h1 style="font-size: 0.9rem; color: var(--ddpl-yellow); margin: 0;">DDPL SCOREBOARD</h1>
        <button onclick="exitToSetup()" style="background:var(--ddpl-red); color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer;">EXIT</button>
    </header>

    <div id="setup-screen">
        <div class="input-group">
            <label>Format</label>
            <select id="mode-select" onchange="updateSetupUI()">
                <option value="straight">Straight Match</option>
                <option value="sets">Set Play</option>
            </select>
        </div>

        <div class="input-group">
            <label>Players / Teams</label>
            <input type="text" id="p1-name" placeholder="Home Side">
            <input type="text" id="p2-name" placeholder="Away Side">
        </div>

        <div id="straight-options" class="input-group">
            <label>Race To (Frames)</label>
            <input type="number" id="race-frames" value="7">
        </div>

        <div id="set-options" class="input-group" style="display:none;">
            <label>First To (Sets)</label>
            <input type="number" id="race-sets" value="3">
            <label>Frames Per Set (First To)</label>
            <input type="number" id="frames-per-set" value="3">
        </div>

        <button class="start-btn" onclick="initMatch()">Start Match</button>
    </div>

    <div id="scoreboard-screen">
        <div id="sets-header" class="sets-row" style="display:none;">
            <div class="set-stat"><div class="set-lbl">Sets</div><div id="p1-sets-disp" class="set-val">0</div></div>
            <div style="align-self:center; opacity:0.3; font-weight:bold;">VS</div>
            <div class="set-stat"><div class="set-lbl">Sets</div><div id="p2-sets-disp" class="set-val">0</div></div>
        </div>

        <div class="score-area">
            <div id="p1-zone" class="player-zone active-break" onclick="handleScore(1)">
                <div class="break-dot">ON BREAK</div>
                <div id="p1-name-disp" class="name-tag">PLAYER 1</div>
                <div id="p1-score-disp" class="big-num">0</div>
                <button class="minus-btn" onclick="adjustScore(1, -1, event)">MINUS</button>
            </div>
            <div id="p2-zone" class="player-zone" onclick="handleScore(2)">
                <div class="break-dot">ON BREAK</div>
                <div id="p2-name-disp" class="name-tag">PLAYER 2</div>
                <div id="p2-score-disp" class="big-num">0</div>
                <button class="minus-btn" onclick="adjustScore(2, -1, event)">MINUS</button>
            </div>
        </div>

        <div class="log-container">
            <div class="log-header"><span id="format-tag">RACE TO 7</span><span>MATCH LOG</span></div>
            <div id="log-output"></div>
        </div>
    </div>

    <div class="footer">SPONSORED BY: [YOUR SPONSOR]</div>

    <script>
        let matchData = {
            mode: 'straight',
            p1: 'P1', p2: 'P2',
            scores: [0, 0],
            sets: [0, 0],
            raceFrames: 7,
            raceSets: 3,
            fps: 3,
            breaker: 1
        };

        function updateSetupUI() {
            const mode = document.getElementById('mode-select').value;
            document.getElementById('straight-options').style.display = mode === 'straight' ? 'block' : 'none';
            document.getElementById('set-options').style.display = mode === 'sets' ? 'block' : 'none';
        }

        function initMatch() {
            matchData.mode = document.getElementById('mode-select').value;
            matchData.p1 = document.getElementById('p1-name').value || "Home";
            matchData.p2 = document.getElementById('p2-name').value || "Away";
            matchData.raceFrames = parseInt(document.getElementById('race-frames').value);
            matchData.raceSets = parseInt(document.getElementById('race-sets').value);
            matchData.fps = parseInt(document.getElementById('frames-per-set').value);
            
            matchData.scores = [0, 0];
            matchData.sets = [0, 0];
            matchData.breaker = 1;

            document.getElementById('p1-name-disp').innerText = matchData.p1;
            document.getElementById('p2-name-disp').innerText = matchData.p2;
            document.getElementById('sets-header').style.display = matchData.mode === 'sets' ? 'flex' : 'none';
            document.getElementById('format-tag').innerText = matchData.mode === 'sets' ? 
                `FIRST TO ${matchData.raceSets} SETS (FT${matchData.fps} PER SET)` : `FIRST TO ${matchData.raceFrames}`;

            render();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('scoreboard-screen').style.display = 'flex';
            addLog("Match Started");
        }

        function handleScore(playerIndex) {
            const idx = playerIndex - 1;
            matchData.scores[idx]++;
            addLog(`${idx === 0 ? matchData.p1 : matchData.p2} won frame (${matchData.scores[0]}-${matchData.scores[1]})`);
            
            // Toggle Breaker
            matchData.breaker = matchData.breaker === 1 ? 2 : 1;

            if (matchData.mode === 'straight') {
                if (matchData.scores[idx] >= matchData.raceFrames) {
                    alert(`${idx === 0 ? matchData.p1 : matchData.p2} WINS THE MATCH!`);
                }
            } else {
                if (matchData.scores[idx] >= matchData.fps) {
                    matchData.sets[idx]++;
                    addLog(`${idx === 0 ? matchData.p1 : matchData.p2} WON THE SET!`, true);
                    matchData.scores = [0, 0];
                    if (matchData.sets[idx] >= matchData.raceSets) {
                        alert(`${idx === 0 ? matchData.p1 : matchData.p2} WINS THE MATCH!`);
                    }
                }
            }
            render();
        }

        function adjustScore(playerIndex, amt, e) {
            e.stopPropagation();
            const idx = playerIndex - 1;
            matchData.scores[idx] = Math.max(0, matchData.scores[idx] + amt);
            addLog(`Correction: ${idx === 0 ? matchData.p1 : matchData.p2} score adjusted`);
            render();
        }

        function addLog(msg, isSet = false) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const log = document.getElementById('log-output');
            const div = document.createElement('div');
            div.className = isSet ? "log-entry set-win" : "log-entry";
            div.innerHTML = `<span style="color:#555">[${time}]</span> ${msg}`;
            log.prepend(div);
        }

        function render() {
            document.getElementById('p1-score-disp').innerText = matchData.scores[0];
            document.getElementById('p2-score-disp').innerText = matchData.scores[1];
            document.getElementById('p1-sets-disp').innerText = matchData.sets[0];
            document.getElementById('p2-sets-disp').innerText = matchData.sets[1];
            
            document.getElementById('p1-zone').classList.toggle('active-break', matchData.breaker === 1);
            document.getElementById('p2-zone').classList.toggle('active-break', matchData.breaker === 2);
        }

        function exitToSetup() {
            if (confirm("End match and return to setup?")) location.reload();
        }
    </script>
</body>
</html>
